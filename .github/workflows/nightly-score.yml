name: Nightly import + score

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC every night
  workflow_dispatch:        # also triggerable manually from GitHub UI

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Write the Google service account key to disk so ADC picks it up
      - name: Set up Google credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Import games from RAWG
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          RAWG_API_KEY:       ${{ secrets.RAWG_API_KEY }}
          GOOGLE_PROJECT_ID:  ${{ secrets.GOOGLE_PROJECT_ID }}
          GOOGLE_LOCATION:    ${{ secrets.GOOGLE_LOCATION }}
        run: node --env-file=/dev/null node_modules/tsx/dist/cli.cjs scripts/import-rawg.ts
        continue-on-error: true   # don't abort scoring if RAWG is flaky

      - name: Score pending games
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          RAWG_API_KEY:       ${{ secrets.RAWG_API_KEY }}
          GOOGLE_PROJECT_ID:  ${{ secrets.GOOGLE_PROJECT_ID }}
          GOOGLE_LOCATION:    ${{ secrets.GOOGLE_LOCATION }}
        run: node --env-file=/dev/null node_modules/tsx/dist/cli.cjs scripts/auto-review-pending.ts --provider google --limit 200
