name: Nightly import + score

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC every night
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max games to score (default: 200)'
        required: false
        default: '200'
      dry_run:
        description: 'Dry run — score but skip DB writes (true/false)'
        required: false
        default: 'false'
      skip_import:
        description: 'Skip RAWG import step (true/false)'
        required: false
        default: 'false'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Google credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Import games from RAWG
        if: ${{ github.event.inputs.skip_import != 'true' }}
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          RAWG_API_KEY:      ${{ secrets.RAWG_API_KEY }}
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          GOOGLE_LOCATION:   ${{ secrets.GOOGLE_LOCATION }}
        run: npx tsx scripts/import-rawg.ts
        continue-on-error: true   # don't abort scoring if RAWG is flaky

      - name: Score pending games
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          RAWG_API_KEY:      ${{ secrets.RAWG_API_KEY }}
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          GOOGLE_LOCATION:   ${{ secrets.GOOGLE_LOCATION }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '200' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--provider google --limit $LIMIT"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: auto-review-pending.ts $ARGS"
          npx tsx scripts/auto-review-pending.ts $ARGS
