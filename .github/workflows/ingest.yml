name: Ingest Games

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secrets presence
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL secret is missing or empty!"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::CRON_SECRET secret is missing or empty!"
            exit 1
          fi
          echo "APP_URL is set: ${{ secrets.APP_URL }}"
          echo "CRON_SECRET is set: [hidden]"

      - name: Test URL format
        run: |
          TARGET_URL="${{ secrets.APP_URL }}/api/cron/ingest-games"
          echo "Full URL: $TARGET_URL"
          if [[ ! "$TARGET_URL" =~ ^https?:// ]]; then
            echo "::error::APP_URL does not start with http:// or https:// — value: $TARGET_URL"
            exit 1
          fi
          echo "URL format looks valid"

      - name: Run ingest
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/ingest-games")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Ingest failed with status $HTTP_CODE"
            exit 1
          fi
